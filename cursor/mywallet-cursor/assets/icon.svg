<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title>My Wallet icon</title>
  <desc>My Wallet shared plugin icon</desc>
  <defs>
    <clipPath id="clip">
      <rect width="512" height="512" rx="108" />
    </clipPath>
  </defs>
  <image
    width="512"
    height="512"
    preserveAspectRatio="xMidYMid slice"
    clip-path="url(#clip)"
    href="data:image/jpeg;base64," />
</svg>
